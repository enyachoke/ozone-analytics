services:
  artemis:
    image: apache/activemq-artemis:2.44.0
    environment:
      ARTEMIS_USERNAME: ${ARTEMIS_USERNAME:-artemis}
      ARTEMIS_PASSWORD: ${ARTEMIS_PASSWORD:-artemis}
    ports:
      - "${ARTEMIS_CONSOLE_PORT:-8161}:8161"
      - "${ARTEMIS_BROKER_PORT:-61616}:61616"
    networks:
      - ozone-analytics
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8161" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  eip-client:
    image: mekomsolutions/eip-client
    environment:
      EIP_DHIS2_MAPPING_FILE: ${EIP_DHIS2_MAPPING_FILE:-/eip-client/config/dhis2-mappings.yml}
      # Disable Spring Boot Actuator HikariCP metrics to avoid version conflicts
      SPRING_AUTOCONFIGURE_EXCLUDE: org.springframework.boot.actuate.autoconfigure.metrics.jdbc.DataSourcePoolMetricsAutoConfiguration
      MANAGEMENT_METRICS_ENABLE_JVM: "false"
      MANAGEMENT_METRICS_ENABLE_HIKARICP: "false"
      # ActiveMQ Artemis configuration
      ARTEMIS_BROKER_URL: tcp://artemis:61616
      ARTEMIS_USERNAME: ${ARTEMIS_USERNAME:-artemis}
      ARTEMIS_PASSWORD: ${ARTEMIS_PASSWORD:-artemis}
      ARTEMIS_POOL_SIZE: ${ARTEMIS_POOL_SIZE:-10}
      # DHIS2 Configuration
      DHIS2_URL: ${DHIS2_URL}
      DHIS2_USERNAME: ${DHIS2_USERNAME}
      DHIS2_PASSWORD: ${DHIS2_PASSWORD}
      EIP_POSTGRESQL_JDBC_URL: ${EIP_POSTGRESQL_JDBC_URL:-jdbc:postgresql://postgresql:5432/analytics}
      EIP_POSTGRESQL_USERNAME: ${EIP_POSTGRESQL_USERNAME:-analytics}
      EIP_POSTGRESQL_PASSWORD: ${EIP_POSTGRESQL_PASSWORD:-password}
      EIP_DHIS2_BASE_URL: ${EIP_DHIS2_BASE_URL:-http://dhis2:8080}
      EIP_DHIS2_USERNAME: ${EIP_DHIS2_USERNAME:-admin}
      EIP_DHIS2_PASSWORD: ${EIP_DHIS2_PASSWORD:-district}
      TZ: ${TZ:-UTC}
    ports:
      - "${EIP_CLIENT_PORT:-8085}:8080"
    volumes:
      - ${EIP_ANALYTICS_DHIS2_ROUTES_PATH}:/eip-client/routes
      - ${EIP_ANALYTICS_DHIS2_CONFIG_PATH}:/eip-client/config
      - ${EIP_HOME_DIR_HOST:-eip_analytics_dhis2_home}:/eip-home
    depends_on:
      artemis:
        condition: service_started
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - ozone-analytics
    restart: unless-stopped
volumes:
  eip_analytics_dhis2_home:
