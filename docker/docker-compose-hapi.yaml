services:
   
  hapi-server:
    image: "hapiproject/hapi:latest"
    environment:
      - hapi.fhir.mdm_enabled=false
      - spring.datasource.url=jdbc:postgresql://postgresql:5432/${HAPI_DB_NAME}
      - spring.datasource.username=${HAPI_DB_USER}
      - spring.datasource.password=${HAPI_DB_PASSWORD}
      - spring.datasource.driverClassName=org.postgresql.Driver
      - spring.jpa.properties.hibernate.dialect=ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgresDialect
      - hapi.fhir.bulk_export_enabled=true

    restart: unless-stopped
    ports:
      - 8093:8080
    networks:
      ozone-analytics:
      
volumes:
  hapi-server:
